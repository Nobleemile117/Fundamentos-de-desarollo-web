<!-- Descripcion del codigo German Gonzalez 
El input filtra las cards en tiempo real con cada tecla presionada
Si el texto de la card contiene lo escrito, se muestra si no, se oculta
Si no hay coincidencias, se muestra un mensaje de "sin resultados"
Al vaciar el input, se muestran todas las cards de nuevo -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    body {
      font-family: sans-serif;
      padding: 24px 16px;
      background: #fff;
      color: #000;
    }
 

    h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 16px;
    }
 
    #search {
      width: 100%;
      max-width: 360px;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      margin-bottom: 24px;
    }
 

    #card-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
 
    .card {
      padding: 24px 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: default;
    }
 
    .card.hidden {
      display: none;
    }
 
    #no-results {
      display: none;
      color: #999;
      font-size: 15px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
 
  <h1>Buscar</h1>
 
  <input type="text" id="search" placeholder="Buscar...">
 
  <div id="card-list">
    <div class="card">Halo</div>
    <div class="card">Monster hunter</div>
    <div class="card">Nier </div>
    <div class="card">Minecraft</div>
    <div class="card">League of legends</div>
    <div class="card">Ouija Online Simulator</div>
    <div class="card">Monster pocket</div>
  </div>
 
  <p id="no-results">Sin resultados.</p>
 
  <script>
    const search = document.getElementById('search');
    const cards = document.querySelectorAll('.card');
    const noResults = document.getElementById('no-results');
 
    search.addEventListener('input', function () {
      const query = this.value.toLowerCase();
      let visible = 0;
 
      cards.forEach(function (card) {
        const title = card.textContent.toLowerCase();
        if (title.includes(query)) {
          card.classList.remove('hidden');
          visible++;
        } else {
          card.classList.add('hidden');
        }
      });
 
      noResults.style.display = visible === 0 ? 'block' : 'none';
    });
  </script>
 
</body>
</html>
