<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Contenedor Flex</title>

    <style>

        .cont{

            display: flex; 
            justify-content: center; 
            flex-direction: row;
            
        
        }
                .elementLat{
            width: 260px;
            height: 100vh;
            background-color: rgb(44, 43, 43);
            font-size: 50px;
            text-align: center;
            padding-top: 55px;
            color:rgba(255, 255, 255, 0.289);
        }
        .elementTitulo{
            width: 100%;
            height: 70px;
            background-color: rgb(57, 41, 2);
            font-size: 50px;
            font-weight: bold;
            text-align: center;
            padding-top: 20px;
            

        }
        .elementCent{
            width: 375px;
            height: 90vh;
            background-color:rgba(255, 255, 255, 0.289);
            font-size: 50px;
            text-align: center;
            padding-top: 50px  ;
        }
    </style>
</head>
<body>
    <div class="elementTitulo">Titulo </div>
    <div class="cont">
    <div class="elementLat" style="flex-grow: 1;">Izquierda</div>
    
    <div class="elementCent" style="flex-grow: 2;">Centro</div>
    <div class="elementLat" style="flex-grow: 1;">Derecha</div>
    </div>
    
</body>
</html>
